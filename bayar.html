<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Konfir Pembuayaran</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #ffffff;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;}
        img {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;}
    </style>
</head>
<body>
    <img src="RISPEK SUDAH MEMBAYAR😎😎👍.jpg" alt="Rispek Sudah Membayar">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA422KuGv-lJ86IJrjAxo67OeM8QOfpdZ4",
    authDomain: "imk-fando-aufa.firebaseapp.com",
    databaseURL: "https://imk-fando-aufa-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "imk-fando-aufa",
    storageBucket: "imk-fando-aufa.firebasestorage.app",
    messagingSenderId: "142656276642",
    appId: "1:142656276642:web:bfa43814f9f5f2155beffb"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get('orderId');

  window.onload = async function() {
    if (orderId) {
       try {
           await update(ref(db, "orders/" + orderId), { 
               status: 'sedang_dimasak' 
           });
       } catch (error) {
           console.error("Error Firebase:", error);
           document.body.innerHTML = `<h2 style="color: red; text-align: center; margin-top: 50px;">Gagal mengonfirmasi. Periksa koneksi internet.</h2>`;
       }
    } else {
       document.body.innerHTML = `<h2 style="color: orange; text-align: center; margin-top: 50px;">Silakan scan QR dari layar laptop.</h2>`;
    }
  }
</script>
</body>
</html>
